{% extends "layouts/base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Edit Student</h1>
    <p>Update student details</p>
</div>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash-msg">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div class="form-section">
    <form method="POST">
        <label>Full Name</label>
        <input type="text" name="fullname" value="{{ student.fullname }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ student.email }}" required>

        <label>Username</label>
        <input type="text" name="username" value="{{ student.username }}" required>

        <button type="submit">Save Changes</button>
        <a href="/admin/students">
            <button type="button" class="logout-btn" style="margin-top:10px;">Cancel</button>
        </a>
    </form>
</div>
{% endblock %}
