{% extends "layouts/base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Assign Course</h1>
    <p>Enroll a student into a course</p>
</div>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <div class="flash-msg">{{ msg }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div class="form-section">
    <form method="POST">
        <label>Select Student</label>
        <select name="student_id" required>
            <option value="">-- Select Student --</option>
            {% for s in students %}
                <option value="{{ s.id }}">{{ s.fullname }} ({{ s.username }})</option>
            {% endfor %}
        </select>

        <label>Select Course</label>
        <select name="course_id" required>
            <option value="">-- Select Course --</option>
            {% for c in courses %}
                <option value="{{ c.id }}" {{ 'disabled' if c.enrolled >= c.capacity else '' }}>
                    {{ c.name }} ({{ c.enrolled }}/{{ c.capacity }}{{ ' - FULL' if c.enrolled >= c.capacity else '' }})
                </option>
            {% endfor %}
        </select>

        <button type="submit">Assign Course</button>
    </form>
</div>
{% endblock %}
