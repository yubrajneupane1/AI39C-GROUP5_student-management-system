{% extends "layouts/base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Add Course</h1>
    <p>Create a new course</p>
</div>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <div class="flash-msg">{{ msg }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div class="form-section">
    <form method="POST">
        <label>Course Name</label>
        <input type="text" name="name" placeholder="Enter course name" required>

        <label>Description</label>
        <input type="text" name="description" placeholder="Enter description">

        <label>Assign Teacher</label>
        <select name="teacher_id">
            <option value="">-- No Teacher --</option>
            {% for t in teachers %}
                <option value="{{ t.id }}">{{ t.fullname }}</option>
            {% endfor %}
        </select>

        <label>Capacity (max students)</label>
        <input type="number" name="capacity" value="50" min="1" max="50">

        <button type="submit">Add Course</button>
        <a href="/admin/courses">
            <button type="button" class="logout-btn" style="margin-top: 10px;">Cancel</button>
        </a>
    </form>
</div>
{% endblock %}
