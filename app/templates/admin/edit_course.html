{% extends "layouts/base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Edit Course</h1>
    <p>Update course details</p>
</div>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <div class="flash-msg">{{ msg }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

<div class="form-section">
    <form method="POST">
        <label>Course Name</label>
        <input type="text" name="name" value="{{ course.name }}" required>

        <label>Overview</label>
        <textarea name="description" rows="6">{{ course.description or '' }}</textarea>

        <label>Assign Teacher</label>
        <select name="teacher_id">
            <option value="">-- No Teacher --</option>
            {% for t in teachers %}
                <option value="{{ t.id }}" {{ 'selected' if t.id == course.teacher_id else '' }}>
                    {{ t.fullname }}
                </option>
            {% endfor %}
        </select>

        <label>Capacity (max students)</label>
        <input type="number" name="capacity" value="{{ course.capacity }}" min="1" max="50">

        <button type="submit">Save Changes</button>
        <a href="/admin/courses">
            <button type="button" class="logout-btn" style="margin-top: 10px;">Cancel</button>
        </a>
    </form>
</div>
{% endblock %}
