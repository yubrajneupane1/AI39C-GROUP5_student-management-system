<!-- Top Navigation Bar -->
<div class="topbar">
    <div>
        <h3>Welcome, {{ username }}</h3>
        <p>{{ role }}</p>
    </div>
    <div style="display: flex; align-items: center; gap: 16px;">
        <!-- Notifications Bell -->
        <a href="{{ url_for('notification.view_notifications') }}" style="position: relative; text-decoration: none; font-size: 20px; color: #333;">
            🔔
            <span id="notificationBadge" style="position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; font-size: 10px; border-radius: 50%; padding: 2px 6px; min-width: 18px; text-align: center; display: none;">0</span>
        </a>
        <a href="{{ url_for('auth.logout') }}">
            <button class="logout-btn">Switch Account</button>
        </a>
    </div>
</div>
